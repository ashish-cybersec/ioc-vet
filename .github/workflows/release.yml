name: Release

# Publishes to PyPI when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Authentication uses PyPI Trusted Publishing (OIDC), so there is no API token
# stored in this repo — PyPI mints a short-lived credential at publish time
# after verifying this exact owner/repo/workflow/environment. Nothing to leak,
# nothing to rotate.
#
# One-time setup before the first tag; see RELEASING.md.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  # Never publish something that doesn't pass the same bar as a normal PR.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # A tag and pyproject.toml that disagree is a silent mis-publish: you
      # tag v0.2.0, the metadata still says 0.1.0, and PyPI happily accepts
      # 0.1.0 (or rejects it as a duplicate). Fail loudly here instead.
      - name: Verify tag matches the version in pyproject.toml
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$TAG  pyproject=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $VERSION. Bump the version, commit, then re-tag."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata renders on PyPI
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      # PEP 639: PyPI MUST reject any upload that carries both a
      # License-Expression field and a "License ::" classifier. twine check
      # does not catch this, so the failure would only surface at upload —
      # after the whole matrix has passed. Catch it at build time instead.
      - name: Check for conflicting license metadata (PEP 639)
        run: |
          python - <<'PY'
          import sys, zipfile, glob
          whl = glob.glob("dist/*.whl")[0]
          z = zipfile.ZipFile(whl)
          name = next(n for n in z.namelist() if n.endswith("METADATA"))
          meta = z.read(name).decode()
          expr = [l for l in meta.splitlines() if l.startswith("License-Expression:")]
          cls = [l for l in meta.splitlines() if l.startswith("Classifier: License ::")]
          if expr and cls:
              print("::error::PyPI rejects uploads with both License-Expression and "
                    "license classifiers (PEP 639). Remove the 'License ::' "
                    f"classifier from pyproject.toml. Found: {cls}")
              sys.exit(1)
          print(f"license metadata ok: {expr or 'no SPDX expression'}, classifiers={cls or 'none'}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The environment gates publishing and is matched against the Trusted
    # Publisher config on PyPI. Add required reviewers to it in repo settings
    # if you ever want a manual approval step before a release goes out.
    environment:
      name: pypi
      url: https://pypi.org/p/ioc-vet
    permissions:
      # Mandatory for Trusted Publishing — without it the OIDC handshake
      # cannot happen and the upload fails.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Also generates PEP 740 attestations by default, signed with the same
      # OIDC identity used to authenticate. No extra signing step needed.
      - uses: pypa/gh-action-pypi-publish@release/v1
